<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 - Daily Condition Letter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50 min-h-screen flex items-center justify-center p-4">
  
  <div class="max-w-md w-full">
    <!-- 로고 -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">
        📮 Daily Letter
      </h1>
      <p class="text-gray-600 mt-2">AI가 전하는 나만의 편지</p>
    </div>

    <!-- 회원가입 카드 -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">회원가입</h2>
      
      <form id="signupForm">
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-medium mb-2">이름</label>
          <input 
            type="text" 
            id="name" 
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            placeholder="이름을 입력하세요"
          >
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-medium mb-2">아이디</label>
          <input 
            type="text" 
            id="username" 
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            placeholder="아이디를 입력하세요"
          >
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-medium mb-2">이메일</label>
          <input 
            type="email" 
            id="email" 
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            placeholder="이메일을 입력하세요"
          >
        </div>

        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-medium mb-2">비밀번호</label>
          <input 
            type="password" 
            id="password" 
            required
            minlength="6"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            placeholder="비밀번호를 입력하세요 (최소 6자)"
          >
        </div>

        <button 
          type="submit"
          class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-medium hover:shadow-lg transition-all duration-300"
        >
          회원가입
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-gray-600">
          이미 계정이 있으신가요? 
          <a href="/static/login.html" class="text-purple-600 font-medium hover:underline">로그인</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const name = document.getElementById('name').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, name, password })
        });

        const data = await response.json();

        if (data.success) {
          alert('회원가입이 완료되었습니다!');
          
          // 토큰 저장
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          // 메인 페이지로 이동
          window.location.href = '/static/index.html';
        } else {
          alert(data.error || '회원가입에 실패했습니다.');
        }
      } catch (error) {
        console.error('Signup error:', error);
        alert('회원가입 중 오류가 발생했습니다.');
      }
    });
  </script>

</body>
</html>

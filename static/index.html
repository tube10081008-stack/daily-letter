<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Condition Letter</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📝 오늘의 일기</h1>
      <button onclick="logout()" class="logout-btn">로그아웃</button>
    </header>

    <section class="diary-section">
      <h2>일기 작성</h2>
      <form id="diaryForm">
        <div class="form-group">
          <label for="content">오늘의 일기:</label>
          <textarea id="content" name="content" rows="8" required></textarea>
        </div>

        <div class="form-group">
          <label for="mood">기분:</label>
          <select id="mood" name="mood">
            <option value="행복함">😊 행복함</option>
            <option value="평온함">😌 평온함</option>
            <option value="우울함">😢 우울함</option>
            <option value="화남">😠 화남</option>
            <option value="불안함">😰 불안함</option>
          </select>
        </div>

        <button type="submit" class="btn">저장</button>
      </form>
    </section>

    <section class="phrase-section">
      <h2>💭 사랑하는 문장</h2>
      
      <form id="phraseForm">
        <div class="form-group">
          <label for="phraseContent">문장:</label>
          <input type="text" id="phraseContent" name="phraseContent" required>
        </div>

        <div class="form-group">
          <label for="phraseAuthor">작가:</label>
          <input type="text" id="phraseAuthor" name="phraseAuthor">
        </div>

        <button type="submit" class="btn">추가</button>
      </form>

      <h3>내가 사랑한 문장</h3>
      <ul id="phrasesList"></ul>
    </section>

    <footer>
      <p>💌 매일 오전 7시에 AI가 생성한 편지를 이메일로 받아보세요</p>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>

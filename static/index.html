Copy<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Condition Letter - 나의 일기장</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="min-h-screen bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50">
    
    <!-- Header -->
    <header class="header">
      <div class="container">
        <div class="flex justify-between items-center">
          <div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">
              📮 Daily Letter
            </h1>
            <p class="text-gray-600 text-sm mt-1">안녕하세요, <span id="userName">사용자</span>님 👋</p>
          </div>
          <button onclick="logout()" class="btn-secondary">로그아웃</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="container py-8">
      
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="stat-card">
          <div class="stat-icon">📝</div>
          <div class="stat-value" id="diaryCount">0</div>
          <div class="stat-label">작성한 일기</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💌</div>
          <div class="stat-value" id="letterCount">0</div>
          <div class="stat-label">받은 편지</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <div class="stat-value" id="phraseCount">0</div>
          <div class="stat-label">저장한 명언</div>
        </div>
      </div>

      <!-- Emotion Chart -->
      <div class="card mb-8">
        <h2 class="card-title">📊 최근 7일 감정</h2>
        <div class="chart-container">
          <canvas id="emotionChart"></canvas>
        </div>
      </div>

      <!-- Diary Write Form -->
      <div class="card mb-8">
        <h2 class="card-title">✍️ 오늘의 일기 작성</h2>
        <form onsubmit="saveDiary(event)">
          <textarea 
            id="diaryContent"
            class="diary-textarea"
            placeholder="오늘 하루는 어떠셨나요? 자유롭게 작성해주세요..."
            required
          ></textarea>
          
          <div class="mt-6">
            <label class="block text-gray-700 text-sm font-medium mb-3">오늘의 기분</label>
            <div class="mood-selector" id="moodSelector">
              <button type="button" class="mood-btn" data-mood="행복함">😄</button>
              <button type="button" class="mood-btn" data-mood="평온함">😌</button>
              <button type="button" class="mood-btn" data-mood="슬픔">😔</button>
              <button type="button" class="mood-btn" data-mood="감사함">🙏</button>
              <button type="button" class="mood-btn" data-mood="흥분됨">🤗</button>
              <button type="button" class="mood-btn" data-mood="피곤함">😴</button>
              <button type="button" class="mood-btn" data-mood="화남">😠</button>
              <button type="button" class="mood-btn" data-mood="불안함">😰</button>
              <button type="button" class="mood-btn" data-mood="기대됨">✨</button>
            </div>
          </div>

          <button type="submit" class="btn-primary mt-6">
            저장하기
          </button>
        </form>
      </div>

      <!-- Phrases Collection -->
      <div class="card mb-8">
        <div class="flex justify-between items-center mb-6">
          <h2 class="card-title mb-0">💭 나만의 명언 컬렉션</h2>
          <button onclick="openAddPhraseModal()" class="btn-secondary">
            + 명언 추가
          </button>
        </div>
        <div id="phrasesGrid" class="phrases-grid"></div>
      </div>

      <!-- Recent Diaries -->
      <div class="card">
        <h2 class="card-title">📖 최근 작성한 일기</h2>
        <div id="recentDiaries" class="timeline"></div>
      </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container text-center text-gray-600">
        <p>Daily Condition Letter © 2025 | AI가 전하는 따뜻한 편지</p>
      </div>
    </footer>

  </div>

  <!-- Add Phrase Modal -->
  <div id="addPhraseModal" class="modal" onclick="closeModalOnOutside(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold text-gray-800">새 명언 추가</h3>
        <button onclick="closeAddPhraseModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <form onsubmit="addPhrase(event)">
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-medium mb-2">명언 내용</label>
          <textarea 
            id="newPhraseContent"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            rows="3"
            placeholder="마음에 드는 명언을 입력하세요"
            required
          ></textarea>
        </div>
        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-medium mb-2">작가 (선택)</label>
          <input 
            type="text"
            id="newPhraseAuthor"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
            placeholder="작가 이름"
          >
        </div>
        <button type="submit" class="btn-primary w-full">
          추가하기
        </button>
      </form>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
